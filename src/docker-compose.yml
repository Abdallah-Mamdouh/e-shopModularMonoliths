services:
  eshopdb:
    image: postgres

  distributedCache:
    image: redis

  seq:
    image: datalust/seq:latest

  messagebus:
    image: rabbitmq:management

  identity:
    image: quay.io/keycloak/keycloak:24.0.3

  host:
    image: ${DOCKER_REGISTRY-}host
    build:
      context: .
      dockerfile: Bootstrapper/Host/Dockerfile

volumes:
  postgres_eshopdb:
